apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector-k8s-helper
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vector-k8s-helper
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vector-k8s-helper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vector-k8s-helper
subjects:
  - kind: ServiceAccount
    name: vector-k8s-helper
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector-k8s-helper
  namespace: kube-system
  labels:
    app: vector-k8s-helper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vector-k8s-helper
  template:
    metadata:
      labels:
        app: vector-k8s-helper
    spec:
      serviceAccountName: vector-k8s-helper
      containers:
        - name: vector-k8s-helper
          image: vector-k8s-helper:latest
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CONFIGMAP_NAME
              value: "vector-scrape-config"
            - name: CONFIGMAP_KEY
              value: "scrape_sources.yaml"
            - name: SCRAPE_INTERVAL
              value: "30s"
            - name: CLUSTER_LABEL
              value: ""
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi