apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector-k8s-helper
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vector-k8s-helper
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "nodes", "namespaces"]
    verbs: ["list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vector-k8s-helper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vector-k8s-helper
subjects:
  - kind: ServiceAccount
    name: vector-k8s-helper
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector-k8s-helper
  namespace: kube-system
  labels:
    app: vector-k8s-helper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vector-k8s-helper
  template:
    metadata:
      labels:
        app: vector-k8s-helper
    spec:
      serviceAccountName: vector-k8s-helper
      containers:
        - name: vector-k8s-helper
          image: ghcr.io/sonroyaalmerol/vector-k8s-helper:latest
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CONFIGMAP_NAME
              value: "vector-scrape-config"
            - name: CONFIGMAP_KEY
              value: "scrape_sources.yaml"
            - name: SCRAPE_INTERVAL
              value: "30s"
            - name: SCRAPE_TIMEOUT
              value: "10s"
            - name: HONOR_LABELS
              value: "false"
            - name: CLUSTER_LABEL
              value: "dmz-prod-1"
            - name: ROLES
              value: "pod,endpointslice,endpoints"
            - name: DEBOUNCE_INTERVAL
              value: "250ms"
            - name: RESYNC_INTERVAL
              value: "5m"
            - name: NAMESPACE_EXCLUDE
              value: "kube-system"
            - name: INCLUDE_LABELS
              value: "true"
            - name: INCLUDE_ANNOTATIONS
              value: "false"
            - name: ATTACH_NODE_METADATA
              value: "false"
            - name: ATTACH_NAMESPACE_METADATA
              value: "false"
            - name: METRICS_LISTEN_ADDR
              value: ":9090"
          ports:
            - name: health
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
