# Vector log collector DaemonSet — tails /var/log/pods and ships to nabu.
# Uses the native `vector` sink (not OTLP) because nabu is also Vector.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector-logs
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vector-logs
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vector-logs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vector-logs
subjects:
  - kind: ServiceAccount
    name: vector-logs
    namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-logs-config
  namespace: kube-system
data:
  vector.yaml: |
    data_dir: /var/lib/vector

    sources:
      kubernetes_logs:
        type: kubernetes_logs

    sinks:
      forward_to_nabu:
        type: vector
        inputs: ["kubernetes_logs"]
        address: "nabu.sgl.com:4325"
        tls:
          enabled: true
          server_name: "nabu.sgl.com"
        batch:
          timeout_secs: 1
          max_events: 2048
        healthcheck:
          enabled: false
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector-logs
  namespace: kube-system
  labels:
    app: vector-logs
spec:
  selector:
    matchLabels:
      app: vector-logs
  template:
    metadata:
      labels:
        app: vector-logs
    spec:
      serviceAccountName: vector-logs
      tolerations:
        - operator: Exists
      containers:
        - name: vector
          image: timberio/vector:0.56.0-debian
          args:
            - --config
            - /etc/vector/vector.yaml
            - --watch-config
          env:
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: VECTOR_LOG
              value: "info"
          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
            - name: data
              mountPath: /var/lib/vector
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: vector-logs-config
        - name: data
          emptyDir: {}
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
