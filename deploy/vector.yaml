apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vector-config-reader
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vector-config-reader
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vector-config-reader
subjects:
  - kind: ServiceAccount
    name: vector
    namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-main
  namespace: kube-system
data:
  vector.yaml: |
    data_dir: /var/lib/vector
    configs:
      - /etc/vector/discovered/scrape_sources.yaml
      - /etc/vector/sinks/main.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-sinks
  namespace: kube-system
data:
  main.yaml: |
    sinks:
      prometheus_remote_write:
        type: prometheus_remote_write
        inputs: ["enrich_metrics"]
        endpoint: "http://prometheus:9090/api/v1/write"---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector
  namespace: kube-system
  labels:
    app: vector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vector
  template:
    metadata:
      labels:
        app: vector
    spec:
      serviceAccountName: vector
      containers:
        - name: vector
          image: timberio/vector:0.48.0-debian
          args:
            - --config
            - /etc/vector/main.yaml
            - --watch-config
          env:
            - name: VECTOR_LOG
              value: "info=warn,warn=info"
          volumeMounts:
            - name: main
              mountPath: /etc/vector/main.yaml
              subPath: vector.yaml
            - name: discovered
              mountPath: /etc/vector/discovered
            - name: sinks
              mountPath: /etc/vector/sinks
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: main
          configMap:
            name: vector-main
        - name: sinks
          configMap:
            name: vector-sinks
        - name: discovered
          configMap:
            name: vector-scrape-config
