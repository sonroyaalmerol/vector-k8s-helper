apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vector-config-reader
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vector-config-reader
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vector-config-reader
subjects:
  - kind: ServiceAccount
    name: vector
    namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-main
  namespace: kube-system
data:
  vector.yaml: |
    data_dir: /var/lib/vector
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-sinks
  namespace: kube-system
data:
  main.yaml: |
    sources:
      internal_metrics:
        type: internal_metrics
        scrape_interval_secs: 30
        collect_histograms: true

    transforms:
      tag_internal:
        type: remap
        inputs: ["internal_metrics"]
        source: |
          .tags.cluster = "${VECTOR_CLUSTER:-unknown}"

    sinks:
      prometheus_remote_write:
        type: prometheus_remote_write
        inputs: ["enrich_metrics", "tag_internal"]
        endpoint: "https://mimir.example.com/api/v1/push"
        healthcheck:
          enabled: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector
  namespace: kube-system
  labels:
    app: vector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vector
  template:
    metadata:
      labels:
        app: vector
    spec:
      serviceAccountName: vector
      containers:
        - name: vector
          image: timberio/vector:0.48.0-debian
          args:
            - --config
            - /etc/vector/main.yaml
            - --config
            - /etc/vector/sinks/main.yaml
            - --config-dir
            - /etc/vector/discovered
            - --watch-config
          env:
            - name: VECTOR_LOG
              value: "info=warn,warn=info"
            - name: VECTOR_CLUSTER
              value: "dmz-prod-1"
          volumeMounts:
            - name: main
              mountPath: /etc/vector/main.yaml
              subPath: vector.yaml
              readOnly: true
            - name: sinks
              mountPath: /etc/vector/sinks/main.yaml
              subPath: main.yaml
              readOnly: true
            - name: discovered
              mountPath: /etc/vector/discovered
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: main
          configMap:
            name: vector-main
        - name: sinks
          configMap:
            name: vector-sinks
        - name: discovered
          configMap:
            name: vector-scrape-config
